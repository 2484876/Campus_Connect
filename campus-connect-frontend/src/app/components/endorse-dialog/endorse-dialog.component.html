<div class="modal-backdrop" (click)="close.emit()">
  <div class="modal-frame" (click)="$event.stopPropagation()">

    <div class="modal-head">
      <h3>Endorse {{ endorseeName }}</h3>
      <button class="icon-btn" (click)="close.emit()" title="Close">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
      </button>
    </div>

    <div class="modal-body">

      <div class="seg">
        <button class="seg-btn" [class.active]="mode === 'SKILL'" (click)="setMode('SKILL')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg>
          Specific skill
        </button>
        <button class="seg-btn" [class.active]="mode === 'CATEGORY'" (click)="setMode('CATEGORY')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /><path d="M9 12l2 2 4-4" /></svg>
          General category
        </button>
      </div>

      <!-- SKILL MODE -->
      <div *ngIf="mode === 'SKILL'">
        <div class="field" *ngIf="endorseeSkills.length > 0">
          <label>Pick from their skills</label>
          <div class="chip-row">
            <button *ngFor="let s of endorseeSkills"
                    class="chip"
                    [class.active]="selectedSkill === s"
                    (click)="pickSkill(s)">
              {{ s }}
            </button>
          </div>
        </div>

        <div class="field">
          <label>{{ endorseeSkills.length > 0 ? 'Or add a custom skill' : 'Add a skill' }}</label>
          <input type="text"
                 class="input"
                 [(ngModel)]="customSkill"
                 (input)="selectedSkill = null"
                 placeholder="e.g. Kubernetes, Public Speaking"
                 maxlength="60">
        </div>
      </div>

      <!-- CATEGORY MODE -->
      <div *ngIf="mode === 'CATEGORY'">
        <div class="field">
          <label>Pick a category</label>
          <div class="cat-grid">
            <button *ngFor="let c of categories"
                    class="cat-tile"
                    [class.active]="selectedCategory === c.value"
                    (click)="pickCategory(c.value)">
              {{ c.label }}
            </button>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Add a note (optional)</label>
        <textarea class="input"
                  [(ngModel)]="message"
                  rows="2"
                  maxlength="300"
                  placeholder="Worked together on..."></textarea>
      </div>

      <div class="error-bar" *ngIf="error">{{ error }}</div>

    </div>

    <div class="modal-foot">
      <button class="btn-ghost-sm" (click)="close.emit()">Cancel</button>
      <button class="btn-primary-sm" (click)="submit()" [disabled]="!isValid() || submitting">
        {{ submitting ? 'Endorsing...' : 'Endorse' }}
      </button>
    </div>

  </div>
</div>
