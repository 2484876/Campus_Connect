<div class="widget-card" *ngIf="visible">
  <div class="widget-head">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M20 7L9 18l-5-5" />
    </svg>
    <span>Profile completion</span>
  </div>

  <div class="pc-percent-row">
    <div class="pc-bar">
      <div class="pc-fill" [style.width.%]="data?.percent || 0"></div>
    </div>
    <span class="pc-pct">{{ data?.percent }}%</span>
  </div>

  <div class="pc-missing" *ngIf="data && data.missing.length > 0">
    <div class="pc-label">Complete to boost visibility</div>
    <a *ngFor="let m of data.missing.slice(0, 4)"
       [routerLink]="['/profile', myId]"
       class="pc-item">
      <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
      <span>{{ m.label }}</span>
      <span class="pc-weight">+{{ m.weight }}%</span>
    </a>
  </div>
</div>
