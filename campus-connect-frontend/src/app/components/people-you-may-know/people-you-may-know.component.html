<div class="widget-card" *ngIf="visible().length > 0">
  <div class="widget-head">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
      <circle cx="9" cy="7" r="4" />
      <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
      <path d="M16 3.13a4 4 0 0 1 0 7.75" />
    </svg>
    <span>People you may know</span>
  </div>

  <div class="pymk-list">
    <div *ngFor="let s of visible()" class="pymk-row">
      <a [routerLink]="['/profile', s.userId]" class="pymk-avatar-link">
        <img [src]="avatar(s)" class="pymk-avatar">
      </a>
      <div class="pymk-info">
        <a [routerLink]="['/profile', s.userId]" class="pymk-name">{{ s.name }}</a>
        <div class="pymk-pos" *ngIf="s.position">{{ s.position }}</div>
        <div class="pymk-reason">{{ s.reason }}</div>
        <div class="pymk-actions">
          <button class="btn-primary-xs" (click)="openConnect(s)">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
            Connect
          </button>
          <button class="btn-ghost-xs" (click)="dismiss(s)">Dismiss</button>
        </div>
      </div>
    </div>
  </div>
</div>

<app-connect-request-dialog *ngIf="dialogTarget"
                            [userId]="dialogTarget.userId"
                            [userName]="dialogTarget.name"
                            [userAvatarUrl]="dialogTarget.profilePicUrl"
                            [position]="dialogTarget.position"
                            (close)="closeDialog()"
                            (sent)="onSent()"></app-connect-request-dialog>
