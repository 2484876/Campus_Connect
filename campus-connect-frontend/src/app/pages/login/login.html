    <h1>Campus Connect</h1>
    <p>Connect with your campus community</p>
  </div>

  <div class="auth-card">
    <h2>Sign in</h2>

    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" class="form-control" [(ngModel)]="email" placeholder="you@campus.edu">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-control" [(ngModel)]="password" placeholder="Enter your password" (keyup.enter)="onLogin()">
    </div>

    <button class="btn btn-primary w-100 btn-lg" (click)="onLogin()" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign in' }}
    </button>

    <div class="auth-footer">
      New to Campus Connect? <a routerLink="/register">Join now</a>
    </div>
  </div>
</div>
