<div class="auth-page">
  <div class="auth-header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Cognizant%27s_logo.svg" alt="Cognizant" style="height: 40px;">
    <h1>Join Campus Connect</h1>
    <p>Make the most of your professional journey</p>
  </div>

  <div class="auth-card">
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" class="form-control" [(ngModel)]="form.name" placeholder="Rahul Kumar">
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" class="form-control" [(ngModel)]="form.email" placeholder="rahul@cognizant.com">
    </div>

    <div class="form-group">
      <label>Password * (min 6 characters)</label>
      <input type="password" class="form-control" [(ngModel)]="form.password" placeholder="Create a password">
    </div>

    <div class="form-group">
      <label>Designation</label>
      <select class="form-control" [(ngModel)]="form.role">
        <option value="PROGRAMMER_ANALYST_TRAINEE">Programmer Analyst Trainee (PAT)</option>
        <option value="PROGRAMMER_ANALYST">Programmer Analyst (PA)</option>
        <option value="ASSOCIATE">Associate</option>
        <option value="SENIOR_ASSOCIATE">Senior Associate</option>
        <option value="MANAGER">Manager</option>
        <option value="SENIOR_MANAGER">Senior Manager</option>
        <option value="ASSOCIATE_DIRECTOR">Associate Director</option>
        <option value="DIRECTOR">Director</option>
        <option value="SENIOR_DIRECTOR">Senior Director</option>
        <option value="AVP">AVP</option>
        <option value="VP">VP</option>
        <option value="SVP">SVP</option>
      </select>
    </div>

    <div class="row">
      <div class="col-6">
        <div class="form-group">
          <label>Department / Practice</label>
          <input type="text" class="form-control" [(ngModel)]="form.department" placeholder="Digital Engineering">
        </div>
      </div>
      <div class="col-6">
        <div class="form-group">
          <label>Current Position</label>
          <input type="text" class="form-control" [(ngModel)]="form.position" placeholder="Full Stack Developer">
        </div>
      </div>
    </div>

    <button class="btn btn-primary w-100 btn-lg" (click)="onRegister()" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Agree & Join' }}
    </button>

    <div class="auth-footer">
      Already on Campus Connect? <a routerLink="/login">Sign in</a>
    </div>
  </div>
</div>
